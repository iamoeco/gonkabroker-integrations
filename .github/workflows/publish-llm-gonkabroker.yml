name: Publish llm-gonkabroker to PyPI

# Trusted Publishing (OIDC) — no API token. PyPI is configured to trust this
# repository + workflow. Releases are cut by pushing a tag like
# `llm-gonkabroker-v0.1.0`; this workflow builds the package in ./llm and
# publishes it via a short-lived OIDC token. No personal account is involved.

on:
  push:
    tags:
      - 'llm-gonkabroker-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: llm
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: llm/dist/
